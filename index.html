<!DOCTYPE html>
<html lang="en">
<head>

  <title>AI Presence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" class="calm">

  <h1>AI Presence</h1>

    <canvas id="avatarCanvas"></canvas>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
