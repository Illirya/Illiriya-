<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Presence Interface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app" class="calm">

    <h1>AI Presence Interface</h1>

    <div id="modeIndicator">Mode: calm</div>

    <div id="chat"></div>

    <div class="input-area">
      <input 
        type="text" 
        id="input" 
        placeholder="Speak to the system..."
      />
      <button onclick="sendMessage()">Send</button>
    </div>

    <div id="threeLayer">
      3D / Hologram Layer (ready)
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
